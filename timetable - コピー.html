<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  color: white;
}

/* ヘッダー */
header {
  text-align: center;
  padding: 30px;
  font-size: 28px;
  font-weight: bold;
}

/* 今日の記念日 */
.today-box {
  margin: 20px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  display: none;
  text-align: center;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* カード */
.card {
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.03);
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 15px;
}

.tag {
  display: inline-block;
  background: #38bdf8;
  padding: 4px 8px;
  border-radius: 8px;
  margin: 3px;
  font-size: 12px;
}

.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 16px 20px 0;
}

.filter-bar button {
  border: none;
  border-radius: 999px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.18);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.filter-bar button:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.28);
}

.filter-bar button.active {
  background: #38bdf8;
  color: #001018;
  font-weight: bold;
}
</style>
</head>

<script>

let current = new Date();

function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const title = document.getElementById("calendarTitle");

  grid.innerHTML = "";

  const year = current.getFullYear();
  const month = current.getMonth();

  title.textContent = `${year}年 ${month + 1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  // 空白
  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += `<div></div>`;
  }

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = String(month + 1).padStart(2,"0") + "-" + String(d).padStart(2,"0");

    let classes = "day";

    const today = new Date();
    if (
      d === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear()
    ) {
      classes += " today";
    }

const filteredMembers = members.filter(m => {
  if (currentFilter === "all") return true;

  if (Array.isArray(m.gen)) {
    return m.gen.includes(currentFilter);
  }

  return m.gen === currentFilter;
});

const birthdays = filteredMembers.filter(m => m.birthday === dateStr);
const debuts = filteredMembers.filter(m => m.debut === dateStr);

    if (birthdays.length && debuts.length) {
      classes += " both";
    } else if (birthdays.length) {
      classes += " birthday";
    } else if (debuts.length) {
      classes += " debut";
    }

    grid.innerHTML += `
      <div class="${classes}" onclick="showEvents('${dateStr}'); highlightCards('${dateStr}')">
        ${d}
      </div>
    `;
  }
}

// クリック時イベント表示
function showEvents(dateStr) {
  const box = document.getElementById("eventDetail");

  const events = [];

  members.forEach(m => {
    if (m.birthday === dateStr) {
      events.push(`🎂 ${m.name}の誕生日`);
    }
    if (m.debut === dateStr) {
      events.push(`🎉 ${m.name}のデビュー日`);
    }
  });

  if (events.length === 0) {
    box.innerHTML = "この日は記念日なし";
  } else {
    box.innerHTML = events.join("<br>");
  }
}

function highlightCards(dateStr) {
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    // 一旦リセット
    card.style.boxShadow = "";
    card.style.border = "";

    if (
      card.dataset.birthday === dateStr ||
      card.dataset.debut === dateStr
    ) {
      card.style.border = "3px solid gold";
      card.style.boxShadow = "0 0 20px gold";
    }
  });
}

// 月移動
function prevMonth() {
  current.setMonth(current.getMonth() - 1);
  renderCalendar();
}

function nextMonth() {
  current.setMonth(current.getMonth() + 1);
  renderCalendar();
}

renderCalendar();
renderMembers();
filterMembers("all");

</script>

.gamers {
  background: linear-gradient(45deg, #c4b5fd, #ddd6fe);
}
.holox {
  background: linear-gradient(45deg, #4c1d95, #7c3aed);
}
.nepolabo {
  background: linear-gradient(45deg, #fbcfe8, #fde68a);
}
.flowglow {
  background: linear-gradient(45deg, #cffafe, #ccfbf1);
  color: #222;
}
.regloss {
  background: linear-gradient(45deg, #fca5a5, #fdba74);
  color: #222;
}
.calendar {
  margin: 20px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.day {
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  text-align: center;
  cursor: pointer;
}

.today {
  border: 2px solid yellow;
}

.birthday {
  background: #ec4899;
}

.debut {
  background: #38bdf8;
}

.both {
  background: linear-gradient(45deg, #ec4899, #38bdf8);
}

.event-detail {
  margin-top: 10px;
}
@media (max-width: 768px) {

  header {
    font-size: 22px;
    padding: 20px;
  }

  .grid {
    grid-template-columns: 1fr;
    padding: 10px;
  }

  .filter-bar {
    gap: 6px;
    padding: 10px;
  }

  .filter-bar button {
    font-size: 12px;
    padding: 8px 12px;
  }

  .calendar-grid {
    gap: 4px;
  }

  .day {
    padding: 8px;
    font-size: 13px;
  }

  .card img {
    height: 220px;
  }
}
</style>


</body>
